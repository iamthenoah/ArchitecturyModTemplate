name: Publish

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make Gradlew Executable
        run: chmod +x ./gradlew

      - name: Build Neoforge
        run: ./gradlew :neoforge:remapJar

      - name: Build Fabric
        run: ./gradlew :fabric:remapJar

      - name: Publish Neoforge
        uses: Kira-NT/mc-publish@v3
        with:
          files: neoforge/build/libs/!(*-@(dev|sources|javadoc)).jar
          # modrinth 
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          # curseforge
          curseforge-id: ${{ vars.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          # administrative
          changelog-file: docs/CHANGELOG.md
          dependencies: |
            architectury-api(required)

      - name: Publish Fabric
        uses: Kira-NT/mc-publish@v3
        with:
          files: fabric/build/libs/!(*-@(dev|sources|javadoc)).jar
          # modrinth 
          modrinth-id: ${{ vars.MODRINTH_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          # curseforge
          curseforge-id: ${{ vars.CURSEFORGE_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          # administrative
          changelog-file: docs/CHANGELOG.md
          dependencies: |
            architectury-api(required)
